<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GeoMeta — Learn GeoGuessr Metas</title>
  <meta name="description" content="Train your GeoGuessr skills by learning real country metas — from city scripts to rural bollards.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:   #00c853;
      --accent-d: #00a040;
      --dark:     #0a0a0a;
      --surface:  #141414;
      --s2:       #1e1e1e;
      --s3:       #282828;
      --text:     #f0f0f0;
      --muted:    #888;
      --danger:   #ff4444;
      --bronze:   #ff8f00;
      --silver:   #b0bec5;
      --gold:     #ffd600;
      --diamond:  #80d8ff;
      --fd: 'Barlow Condensed', sans-serif;
      --fb: 'Space Grotesk', sans-serif;
    }
    html, body {
      height: 100%;
      font-family: var(--fb);
      background: #000;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ───────────────────────────────────────────────── */
    #app {
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--dark);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── League bar ───────────────────────────────────────────── */
    .lbar {
      background: var(--surface);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a2a;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .lname {
      font-family: var(--fd);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .5px;
    }
    .lb { color: var(--bronze); }
    .ls { color: var(--silver); }
    .lg { color: var(--gold); }
    .ld { color: var(--diamond); }
    .xrow { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
    .xbg  { flex: 1; height: 4px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
    .xfill { height: 100%; border-radius: 2px; transition: width .6s ease; }
    .xlbl { font-size: 10px; color: var(--muted); white-space: nowrap; }
    .spill {
      font-family: var(--fd);
      font-size: 16px;
      font-weight: 700;
      background: var(--s2);
      padding: 4px 12px;
      border-radius: 20px;
      color: var(--accent);
      border: 1px solid #2a2a2a;
      margin-left: 10px;
      white-space: nowrap;
    }

    /* ── Streak row ───────────────────────────────────────────── */
    .srow {
      display: flex;
      gap: 5px;
      padding: 10px 16px 0;
      align-items: center;
    }
    .sd {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #2a2a2a;
      transition: background .3s;
      flex-shrink: 0;
    }
    .sd.hit { background: var(--accent); }
    .sd.miss { background: var(--danger); }
    .sd.cur { background: #444; outline: 2px solid #555; outline-offset: 1px; }
    .slbl { font-size: 11px; color: var(--muted); margin-left: 5px; }

    /* ── Image box ────────────────────────────────────────────── */
    .img-box {
      margin: 12px 16px;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      background: #111;
      border: 1px solid #2a2a2a;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .img-grad {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,.65) 100%);
      pointer-events: none;
    }
    .clue-chip {
      position: absolute;
      bottom: 10px; left: 10px;
      background: rgba(0,0,0,.82);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.12);
      display: flex;
      align-items: center;
      gap: 5px;
      z-index: 3;
      max-width: 75%;
    }
    .ci {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .dchip {
      position: absolute;
      top: 10px; right: 10px;
      font-family: var(--fd);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 8px;
      letter-spacing: .5px;
      z-index: 3;
    }
    .de { background:#1b3a1b; color:#69f0ae; border:1px solid #2d5a2d; }
    .dm { background:#3a2a00; color:#ffd740; border:1px solid #5a4200; }
    .dh { background:#3a0000; color:#ff6e6e; border:1px solid #5a0000; }
    .dx { background:#1a004d; color:#ea80fc; border:1px solid #3a006d; }

    /* ── Image status (spinner / error) ───────────────────────── */
    .img-status {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      z-index: 2;
      text-align: center;
      padding: 0 24px;
    }
    .spin {
      width: 28px; height: 28px;
      border: 2px solid #2a2a2a;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: sp .8s linear infinite;
    }
    @keyframes sp { to { transform: rotate(360deg); } }

    .imgcred {
      font-size: 10px;
      color: #444;
      padding: 2px 16px 0;
      text-align: right;
    }
    .imgcred a { color: #555; text-decoration: none; }
    .imgcred a:hover { color: #888; }

    /* ── Meta tag + question ──────────────────────────────────── */
    .mtag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      background: var(--s2);
      color: var(--muted);
      padding: 3px 9px;
      border-radius: 6px;
      margin: 8px 16px 4px;
    }
    .qtext {
      font-family: var(--fd);
      font-size: 19px;
      font-weight: 600;
      line-height: 1.3;
      padding: 0 16px 12px;
      color: #fff;
    }

    /* ── Answer buttons ───────────────────────────────────────── */
    .opts {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .ob {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: var(--s2);
      font-family: var(--fb);
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color .15s, background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .ob:hover:not(:disabled) { border-color: #444; background: var(--s3); }
    .ob:active:not(:disabled) { transform: scale(0.98); }
    .ob.correct  { border-color: var(--accent); background: #0d2e0d; color: #69f0ae; }
    .ob.wrong    { border-color: var(--danger);  background: #2e0d0d; color: #ff8a80; }
    .ob.sc       { border-color: var(--accent); background: #0d2e0d; color: #69f0ae; }
    .ob:disabled { cursor: default; }
    .ob-icon     { font-size: 18px; min-width: 22px; text-align: center; }

    /* ── Explanation box ──────────────────────────────────────── */
    .ebox {
      margin: 12px 16px 0;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--s2);
      border-left: 3px solid var(--accent);
      display: none;
    }
    .ebox.show { display: block; }
    .ebox.we   { border-left-color: var(--danger); }
    .ettl {
      font-family: var(--fd);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .etxt { font-size: 13px; line-height: 1.65; color: #ccc; }
    .pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .pill {
      font-size: 11px;
      background: var(--s3);
      color: #aaa;
      padding: 3px 9px;
      border-radius: 6px;
      border: 1px solid #333;
    }

    /* ── Hint system ──────────────────────────────────────────── */
    .hint-area { padding: 0 16px; margin-bottom: 4px; }
    .hint-btn {
      width: 100%;
      padding: 11px 16px;
      border-radius: 11px;
      border: 1px dashed #3a3a3a;
      background: transparent;
      color: var(--muted);
      font-family: var(--fb);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-color .15s, color .15s, background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .hint-btn:hover:not(:disabled) { border-color: #555; color: #bbb; background: var(--s2); }
    .hint-btn:disabled { opacity: .35; cursor: default; }
    .hint-btn .hb-cost { font-size: 11px; color: #555; margin-left: auto; }

    .hints-used { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .hint-card {
      background: var(--s2);
      border: 1px solid #2a2a2a;
      border-left: 3px solid #444;
      border-radius: 10px;
      padding: 9px 13px;
      font-size: 13px;
      color: #bbb;
      line-height: 1.5;
      animation: hintSlide .25s ease;
    }
    @keyframes hintSlide {
      from { opacity:0; transform:translateY(-6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .hint-card.h1 { border-left-color: var(--accent); }
    .hint-card.h2 { border-left-color: var(--gold); }
    .hint-card.h3 { border-left-color: var(--danger); }
    .hint-num {
      font-family: var(--fd);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .pts-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 16px 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .pts-val {
      font-family: var(--fd);
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      transition: color .4s, transform .2s;
    }
    .pts-val.bump { transform: scale(1.2); }
    .pts-val.c1 { color: var(--gold); }
    .pts-val.c2 { color: var(--bronze); }
    .pts-val.c3 { color: var(--danger); }

    /* ── Next button ──────────────────────────────────────────── */
    .nxt {
      margin: 12px 16px 16px;
      width: calc(100% - 32px);
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #000;
      font-family: var(--fd);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .5px;
      display: none;
      transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .nxt.show { display: block; }
    .nxt:hover  { background: var(--accent-d); }
    .nxt:active { transform: scale(0.98); }

    /* ── Rank-up screen ───────────────────────────────────────── */
    .rankup {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
      min-height: calc(100vh - 70px);
    }
    .rankup.show { display: flex; }
    .ru-ico {
      font-size: 80px;
      margin-bottom: 1rem;
      animation: pop .5s ease;
    }
    @keyframes pop {
      0%   { transform: scale(.4); opacity: 0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1);   opacity: 1; }
    }
    .ru-title {
      font-family: var(--fd);
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: .25rem;
    }
    .ru-sub  { font-size: 15px; color: var(--muted); margin-bottom: .75rem; }
    .ru-badge {
      font-family: var(--fd);
      font-size: 22px;
      font-weight: 700;
      padding: 10px 28px;
      border-radius: 12px;
      border: 2px solid;
      margin: .75rem 0;
    }
    .ru-desc {
      font-size: 14px;
      color: #aaa;
      max-width: 300px;
      line-height: 1.65;
      margin-bottom: 2rem;
    }
    .ru-btn {
      padding: 14px 40px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #000;
      font-family: var(--fd);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .ru-btn:hover { background: var(--accent-d); }

    /* ── Results screen ───────────────────────────────────────── */
    .results {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem 2rem;
      text-align: center;
    }
    .results.show { display: flex; }
    .r-trophy { font-size: 72px; margin-bottom: .75rem; }
    .r-title  { font-family: var(--fd); font-size: 28px; font-weight: 700; }
    .r-sub    { font-size: 14px; color: var(--muted); margin: .25rem 0 1.5rem; }
    .r-score  { font-family: var(--fd); font-size: 56px; font-weight: 700; color: var(--accent); }
    .r-pts    { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; }
    .sgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .sc2 {
      background: var(--s2);
      border-radius: 10px;
      padding: 12px;
      border: 1px solid #2a2a2a;
    }
    .sv { font-family: var(--fd); font-size: 22px; font-weight: 700; }
    .sl { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .r-btn {
      padding: 14px 40px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #000;
      font-family: var(--fd);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .r-btn:hover { background: var(--accent-d); }

    /* ── Responsive fine-tuning ───────────────────────────────── */
    @media (max-width: 380px) {
      .img-box  { height: 200px; }
      .qtext    { font-size: 17px; }
      .ob       { font-size: 14px; padding: 11px 14px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- League bar -->
  <div class="lbar">
    <div style="flex:1;min-width:0">
      <div class="lname lb" id="ln">🥉 BRONZE — European Cities</div>
      <div class="xrow">
        <div class="xbg"><div class="xfill lb-fill" id="xf" style="width:0%;background:var(--bronze)"></div></div>
        <div class="xlbl" id="xl">0 / 10</div>
      </div>
    </div>
    <div class="spill" id="sp">0 pts</div>
  </div>

  <!-- Quiz screen -->
  <div id="qs">
    <div class="srow" id="sr"></div>

    <div class="img-box" id="imgbox">
      <div class="img-status" id="imgst">
        <div class="spin"></div>
        <span>Loading street view…</span>
      </div>
      <img id="imgel" style="display:none" alt="Street view location">
      <div class="img-grad"></div>
      <div class="clue-chip"><div class="ci"></div><span>🌍 Where in Europe is this?</span></div>
      <div class="dchip de" id="dc">CITY</div>
    </div>

    <div class="imgcred" id="imgcred"></div>
    <div class="mtag" id="mt">📍 Europe · Bronze</div>
    <div class="qtext" id="qt"></div>

    <!-- Points preview -->
    <div class="pts-preview">
      <span>Answer now for</span>
      <span class="pts-val" id="ptsval">300</span>
      <span>pts</span>
    </div>

    <!-- Hint system -->
    <div class="hint-area">
      <div class="hints-used" id="hintsused"></div>
      <button class="hint-btn" id="hintbtn" onclick="revealHint()">
        <span>💡</span>
        <span id="hintlabel">Show first clue</span>
        <span class="hb-cost" id="hintcost">−100 pts</span>
      </button>
    </div>

    <div class="opts" id="op"></div>

    <div class="ebox" id="eb">
      <div class="ettl" id="et">The clue</div>
      <div class="etxt" id="ex"></div>
      <div class="pills" id="ep"></div>
    </div>

    <button class="nxt" id="nb">Next location →</button>
  </div>

  <!-- Rank-up screen -->
  <div class="rankup" id="ru">
    <div class="ru-ico" id="ri">🥈</div>
    <div class="ru-title">RANK UP!</div>
    <div class="ru-sub" id="rs2">Incredible!</div>
    <div class="ru-badge" id="rb">SILVER LEAGUE</div>
    <div class="ru-desc" id="rd">Description</div>
    <button class="ru-btn" onclick="doRankUp()">Accept the challenge →</button>
  </div>

  <!-- Results screen -->
  <div class="results" id="res">
    <div class="r-trophy" id="rtr">🌍</div>
    <div class="r-title"  id="rtt">Round complete!</div>
    <div class="r-sub"    id="rss"></div>
    <div class="r-score"  id="rsc">0</div>
    <div class="r-pts">total points</div>
    <div class="sgrid">
      <div class="sc2"><div class="sv" id="s1">0</div><div class="sl">correct</div></div>
      <div class="sc2"><div class="sv" id="s2">0</div><div class="sl">best streak</div></div>
      <div class="sc2"><div class="sv" id="s3">0%</div><div class="sl">accuracy</div></div>
      <div class="sc2"><div class="sv" id="s4">Bronze</div><div class="sl">league</div></div>
    </div>
    <button class="r-btn" onclick="startGame()">Play again</button>
  </div>

</div><!-- #app -->

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────────────
// All Mapillary calls go through the Cloudflare proxy — no CORS issues
const PROXY = 'https://geometa-proxy.youretheproductifitsfree.workers.dev';

async function fetchNearbyImage(lat, lon) {
  try {
    const url  = `${PROXY}?lat=${lat}&lon=${lon}`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    if (!data.data || data.data.length === 0) return null;

    // Pick randomly from up to 8 results for variety each play-through
    const pool   = data.data.slice(0, 8);
    const picked = pool[Math.floor(Math.random() * pool.length)];

    // If thumb URL came back directly, use it
    if (picked.thumb_1024_url) return { url: picked.thumb_1024_url, id: picked.id };

    // Otherwise fetch it via proxy using the image key
    const res2  = await fetch(`${PROXY}?key=${picked.id}`);
    const data2 = await res2.json();
    return data2.thumb_1024_url ? { url: data2.thumb_1024_url, id: picked.id } : null;
  } catch (e) {
    console.warn('Proxy error:', e);
    return null;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// LEAGUES
// ─────────────────────────────────────────────────────────────────────────────
const LEAGUES = [
  { label:'🥉 BRONZE — City Explorer',  cls:'lb', chip:'CITY',   chipCls:'de', xc:'var(--bronze)',
    desc:'Big city streets — read scripts, spot landmarks, city names on signs. Easy to place.' },
  { label:'🥈 SILVER — Towns & Suburbs', cls:'ls', chip:'SUBURB', chipCls:'dm', xc:'var(--silver)',
    desc:'Suburban roads. No famous landmarks. Read road signs and spot infrastructure styles.' },
  { label:'🥇 GOLD — Rural Roads',       cls:'lg', chip:'RURAL',  chipCls:'dh', xc:'var(--gold)',
    desc:'Countryside highways. Bollards, road markings, utility poles. No city names.' },
  { label:'💎 DIAMOND — Wilderness',     cls:'ld', chip:'WILD',   chipCls:'dx', xc:'var(--diamond)',
    desc:'Remote terrain. Car meta, camera gen, confusable country pairs. Experts only.' },
];

// ─────────────────────────────────────────────────────────────────────────────
// QUESTION DATABASE
// Each question has:
//   lat / lon  — GPS used to fetch a LIVE nearby Mapillary image at runtime
//   key        — fallback Mapillary image ID if the API call returns nothing
// ─────────────────────────────────────────────────────────────────────────────

// ── ACTIVE: Bronze — European city streets ────────────────────────────────────
// Each question has 3 progressive hints:
//   hints[0] — vague environmental clue  (costs 100 pts)
//   hints[1] — more specific meta clue   (costs 100 pts)
//   hints[2] — near-giveaway clue        (costs 100 pts)
// Max score per question: 300 (no hints) → 200 → 100 → 50
const BRONZE_EUROPE = [
  {
    c:'Russia', r:'Europe', mt:'🏙️ Soviet Architecture',
    q:'Where in Europe would you find city streets that look exactly like this?',
    opts:['Ukraine','Bulgaria','Kazakhstan','Russia'],
    lat:55.7558, lon:37.6173,
    key:'115004000820956',
    hints:[
      'The writing system on the signs is not Latin — it uses a different alphabet entirely.',
      'The architectural style is unmistakably Soviet: massive buildings, wide boulevards, ornate decorative details on older structures.',
      'The signs are in Cyrillic and the city has iconic Soviet-era skyscrapers called "Stalin's Seven Sisters". This is the capital city.',
    ],
    exp:"Moscow combines Cyrillic-only signs with unmistakable Soviet architecture — massive avenues, ornate Stalinist buildings, and brutalist towers. Ukrainian cities also use Cyrillic but have narrower streets and less imposing Soviet styling.",
    pills:['Cyrillic-only signs','Soviet/Stalinist buildings','Wide multi-lane avenues','Ornate metro station signs'],
  },
  {
    c:'Greece', r:'Europe', mt:'🏙️ City Script',

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
const FLAGS = {
  'Russia':'🇷🇺','Ukraine':'🇺🇦','Bulgaria':'🇧🇬','Kazakhstan':'🇰🇿',
  'Greece':'🇬🇷','Cyprus':'🇨🇾','Albania':'🇦🇱','North Macedonia':'🇲🇰',
  'Turkey':'🇹🇷','Egypt':'🇪🇬','Iran':'🇮🇷','Morocco':'🇲🇦',
  'Poland':'🇵🇱','Czech Republic':'🇨🇿','Hungary':'🇭🇺','Romania':'🇷🇴',
  'Germany':'🇩🇪','France':'🇫🇷','Italy':'🇮🇹','Spain':'🇪🇸',
  'Portugal':'🇵🇹','Netherlands':'🇳🇱','Belgium':'🇧🇪','Austria':'🇦🇹',
  'Sweden':'🇸🇪','Norway':'🇳🇴','Finland':'🇫🇮','Denmark':'🇩🇰',
  'Switzerland':'🇨🇭','Croatia':'🇭🇷','Serbia':'🇷🇸','Slovakia':'🇸🇰',
};

const $ = id => document.getElementById(id);
const sh = a => [...a].sort(() => Math.random() - .5);

// ─────────────────────────────────────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────────────────────────────────────
let league = 0, score = 0, qi = 0, answered = false;
let cStreak = 0, bStreak = 0, results = [], qList = [];

// Hint state — reset each question
let hintsRevealed = 0;

// Points based on hints used: 0→300, 1→200, 2→100, 3→50
const HINT_PTS = [300, 200, 100, 50];
const HINT_LABELS = [
  'Show first clue',
  'Show second clue',
  'Show third clue',
  'No more clues',
];
const HINT_COSTS = ['−100 pts', '−100 pts', '−100 pts', ''];

function currentPts() {
  return HINT_PTS[Math.min(hintsRevealed, 3)];
}

function updatePtsPreview() {
  const pts = currentPts();
  const el  = $('ptsval');
  el.textContent = pts;
  el.className = 'pts-val' +
    (pts === 300 ? '' :
     pts === 200 ? ' c1' :
     pts === 100 ? ' c2' : ' c3');
  // little bump animation
  el.style.transform = 'scale(1.25)';
  setTimeout(() => el.style.transform = '', 200);
}

function revealHint() {
  if (answered) return;
  const q = qList[qi];
  if (hintsRevealed >= q.hints.length) return;

  const hintText = q.hints[hintsRevealed];
  hintsRevealed++;

  // Add hint card
  const container = $('hintsused');
  const card = document.createElement('div');
  card.className = `hint-card h${hintsRevealed}`;
  card.innerHTML = `<div class="hint-num">Clue ${hintsRevealed}</div>${hintText}`;
  container.appendChild(card);

  // Update button
  const btn = $('hintbtn');
  if (hintsRevealed >= q.hints.length) {
    btn.disabled = true;
    $('hintlabel').textContent = 'No more clues';
    $('hintcost').textContent  = '';
  } else {
    $('hintlabel').textContent = HINT_LABELS[hintsRevealed];
    $('hintcost').textContent  = HINT_COSTS[hintsRevealed];
  }

  updatePtsPreview();
}

function resetHints() {
  hintsRevealed = 0;
  $('hintsused').innerHTML    = '';
  $('hintbtn').disabled       = false;
  $('hintlabel').textContent  = HINT_LABELS[0];
  $('hintcost').textContent   = HINT_COSTS[0];
  updatePtsPreview();
}

// ─────────────────────────────────────────────────────────────────────────────
// IMAGE LOADING
// Uses live Mapillary API (works on GitHub Pages).
// Falls back to fetching thumbnail by hardcoded key if API finds nothing.
// ─────────────────────────────────────────────────────────────────────────────
async function loadImage(q) {
  const imgEl = $('imgel');
  const st    = $('imgst');
  imgEl.style.display = 'none';
  st.style.display    = 'flex';
  st.innerHTML        = '<div class="spin"></div><span>Loading street view…</span>';

  // 1. Try live API lookup near GPS coords
  let result = await fetchNearbyImage(q.lat, q.lon);

  // 2. Fallback: fetch thumb URL for hardcoded key via proxy
  if (!result && q.key) {
    try {
      const r = await fetch(`${PROXY}?key=${q.key}`);
      const d = await r.json();
      if (d.thumb_1024_url) result = { url: d.thumb_1024_url, id: q.key };
    } catch(e) {}
  }

  if (result) {
    const tmp    = new Image();
    tmp.onload   = () => {
      imgEl.src           = result.url;
      imgEl.style.display = 'block';
      st.style.display    = 'none';
      $('imgcred').innerHTML =
        `📷 <a href="https://www.mapillary.com/app/?pKey=${result.id}" target="_blank" rel="noopener">Mapillary</a> · CC BY-SA`;
    };
    tmp.onerror  = () => showImgError();
    tmp.src      = result.url;
  } else {
    showImgError();
  }
}

function showImgError() {
  $('imgst').innerHTML =
    '<span style="color:#555;font-size:12px;padding:0 24px;text-align:center">📷 No street view here<br>Use the clue text below to answer</span>';
}

// ─────────────────────────────────────────────────────────────────────────────
// UI UPDATES
// ─────────────────────────────────────────────────────────────────────────────
function updateBar() {
  const l = LEAGUES[Math.min(league, 3)];
  $('ln').textContent  = l.label;
  $('ln').className    = 'lname ' + l.cls;
  $('xf').style.width  = Math.min((cStreak / 10) * 100, 100) + '%';
  $('xf').style.background = l.xc;
  $('xl').textContent  = results.length + ' / ' + qList.length;
  $('sp').textContent  = score + ' pts';
}

function buildStreak() {
  const n = Math.min(qList.length, 10);
  let h = '';
  for (let i = 0; i < n; i++) {
    let c = 'sd';
    if      (i < results.length)    c += results[i] ? ' hit' : ' miss';
    else if (i === results.length)  c += ' cur';
    h += `<div class="${c}"></div>`;
  }
  h += `<span class="slbl">${results.length}/${n}</span>`;
  $('sr').innerHTML = h;
}

// ─────────────────────────────────────────────────────────────────────────────
// GAME FLOW
// ─────────────────────────────────────────────────────────────────────────────
function startGame() {
  score = 0; qi = 0; answered = false; cStreak = 0; bStreak = 0; results = [];

  // Active pool = Bronze Europe only for now
  qList = sh(BRONZE_EUROPE).slice(0, 10);

  $('qs').style.display = 'block';
  $('res').classList.remove('show');
  $('ru').classList.remove('show');
  updateBar();
  loadQ();
}

function loadQ() {
  answered = false;
  const q = qList[qi];
  const l = LEAGUES[Math.min(league, 3)];

  buildStreak();

  $('dc').textContent = l.chip;
  $('dc').className   = 'dchip ' + l.chipCls;
  $('mt').textContent = q.mt + ' · ' + q.r;
  $('qt').textContent = q.q;
  $('eb').className   = 'ebox';
  $('nb').className   = 'nxt';
  $('imgcred').innerHTML = '';

  resetHints();
  loadImage(q);

  const opts = sh([...q.opts]);
  const con  = $('op');
  con.innerHTML = '';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'ob';
    b.innerHTML = `<span>${FLAGS[o] || '🌍'} ${o}</span><span class="ob-icon"></span>`;
    b.onclick   = () => pick(o, q);
    con.appendChild(b);
  });
}

function pick(sel, q) {
  if (answered) return;
  answered = true;

  const ok = sel === q.c;
  const earned = ok ? currentPts() : 0;
  if (ok) { score += earned; cStreak++; if (cStreak > bStreak) bStreak = cStreak; }
  else    { cStreak = 0; }
  results.push(ok);
  buildStreak();
  updateBar();

  document.querySelectorAll('.ob').forEach(b => {
    b.disabled = true;
    const lbl  = b.querySelector('span').textContent.replace(/^\S+\s/, '');
    const icon = b.querySelector('.ob-icon');
    if (lbl === q.c) {
      b.classList.add(ok && lbl === sel ? 'correct' : 'sc');
      icon.textContent = '✓';
    }
    if (lbl === sel && !ok) {
      b.classList.add('wrong');
      icon.textContent = '✗';
    }
  });

  $('et').textContent = ok
    ? `Correct! +${earned} pts${hintsRevealed > 0 ? ` (${hintsRevealed} clue${hintsRevealed>1?'s':''} used)` : ' — no clues needed! 🎯'}`
    : "Not quite — here's the explanation:";
  $('ex').textContent = q.exp;
  $('ep').innerHTML   = (q.pills || []).map(p => `<div class="pill">${p}</div>`).join('');
  $('eb').className   = 'ebox show' + (ok ? '' : ' we');
  $('nb').textContent = qi < qList.length - 1 ? 'Next location →' : 'See results →';
  $('nb').className   = 'nxt show';
}

document.getElementById('nb').onclick = () => {
  qi++;
  if (qi >= qList.length) {
    const corr = results.filter(Boolean).length;
    if (corr >= 8 && league < 3) showRankUp();
    else showResults();
  } else {
    loadQ();
  }
};

// pts() replaced by currentPts() which factors in hints used
// League multiplier can be added here later

function showRankUp() {
  $('qs').style.display = 'none';
  $('ru').classList.add('show');
  const next = LEAGUES[Math.min(league + 1, 3)];
  $('ri').textContent  = ['🥈','🥇','💎','👑'][Math.min(league, 3)];
  $('rb').textContent  = next.label;
  $('rb').style.color        = next.xc;
  $('rb').style.borderColor  = next.xc;
  $('rd').textContent  = next.desc;
  $('rs2').textContent = results.filter(Boolean).length + '/10 correct — incredible!';
}

function doRankUp() {
  league++;
  score = 0; qi = 0; answered = false; cStreak = 0; results = [];
  // TODO: swap qList to the next league's pool when those are activated
  qList = sh(BRONZE_EUROPE).slice(0, 10);
  $('ru').classList.remove('show');
  $('qs').style.display = 'block';
  updateBar();
  loadQ();
}

function showResults() {
  $('qs').style.display = 'none';
  $('res').classList.add('show');
  const corr = results.filter(Boolean).length;
  const pct  = Math.round((corr / qList.length) * 100);
  $('rsc').textContent = score;
  $('rss').textContent = `${corr} of ${qList.length} correct · ${pct}%`;
  $('s1').textContent  = corr;
  $('s2').textContent  = bStreak;
  $('s3').textContent  = pct + '%';
  $('s4').textContent  = LEAGUES[Math.min(league, 3)].label.split('—')[1].trim();
  let t = '🌍', tt = 'Keep grinding!';
  if (pct === 100)     { t = '🏆'; tt = 'Flawless!'; }
  else if (pct >= 80)  { t = '🌟'; tt = 'Pro GeoGuesser!'; }
  else if (pct >= 60)  { t = '🗺️'; tt = 'Getting sharper!'; }
  $('rtr').textContent = t;
  $('rtt').textContent = tt;
}

// Kick off
startGame();
</script>
